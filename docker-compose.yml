services:

  db:
    image: mysql:8.0
    container_name: ecommerce_db
    restart: always
    env_file:
      - .env
    environment:
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: ecommerce_es
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s

  backend:
    build: ./backend
    container_name: ecommerce_backend
    restart: always
    env_file:
      - .env
    environment:
      - TZ=Asia/Ho_Chi_Minh
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: ecommerce_frontend
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  es_data: