<div class="admin-shell" [class.sidebar-collapsed]="!sidebarOpen">
  <aside class="admin-sidebar">
    <div class="side-head">
      <a class="brand" routerLink="/admin/home">Admin<span>Panel</span></a>

      <button class="icon-btn" type="button" (click)="toggleSidebar()" title="Thu gọn / Mở">
        {{ sidebarOpen ? '«' : '»' }}
      </button>
    </div>

    <nav class="nav">
      <a class="nav-item" routerLink="/admin/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
        <span class="ico">🏠</span>
        <span class="txt">Tổng quan</span>
      </a>
      <a class="nav-item" routerLink="/admin/products" routerLinkActive="active">
        <span class="ico">📦</span>
        <span class="txt">Sản phẩm</span>
      </a>
      <a class="nav-item" routerLink="/admin/categories" routerLinkActive="active">
        <span class="ico">🗂</span>
        <span class="txt">Danh mục</span>
      </a>
      <a class="nav-item" routerLink="/admin/users" routerLinkActive="active">
        <span class="ico">👤</span>
        <span class="txt">Người dùng</span>
      </a>
      <a class="nav-item" routerLink="/admin/coupons" routerLinkActive="active">
        <span class="ico">🎟</span>
        <span class="txt">Mã giảm giá</span>
      </a>

      <div class="nav-divider"></div>

      <a class="nav-item" routerLink="/" title="Về trang người dùng">
        <span class="ico">↩</span>
        <span class="txt">Về website</span>
      </a>
    </nav>

    <div class="side-foot">
      <button class="icon-btn" type="button" (click)="toggleTheme()" [title]="theme === 'light' ? 'Dark mode' : 'Light mode'">
        {{ theme === 'light' ? '🌙' : '☀️' }}
      </button>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <div class="crumb">
        <span class="muted">Quản trị</span>
      </div>
      <div class="actions">
        <a class="btn btn-ghost btn-sm" routerLink="/admin/home">Dashboard</a>
      </div>
    </header>

    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <app-admin-toast-container></app-admin-toast-container>
</div>
