<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Quên mật khẩu</h2>
      <p class="subtitle">Nhập email để nhận link đặt lại mật khẩu</p>
    </div>

    @if (!submitted) {
      <form (ngSubmit)="submit()">
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            class="form-control"
            placeholder="name@example.com"
            [(ngModel)]="email"
            name="email"
            required
          />
        </div>

        <button type="submit" class="btn-submit">Gửi link đặt lại</button>

        <div class="aux-row center">
          <a class="link" routerLink="/login">Quay lại đăng nhập</a>
        </div>
      </form>
    } @else {
      <div class="success">
        <div class="success-title">Đã gửi yêu cầu!</div>
        <div class="success-sub">
          Nếu email tồn tại trong hệ thống, bạn sẽ nhận được link đặt lại mật khẩu trong vài phút.
        </div>
      </div>

      <a class="btn-secondary full" routerLink="/login">Về trang đăng nhập</a>
    }
  </div>
</div>
