spring:
  datasource:
    url: jdbc:mysql://localhost:3306/miniecom
    username: root
    password: root

  jpa:
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: your_mail@gmail.com
    password: your_password
    default-encoding: UTF-8
