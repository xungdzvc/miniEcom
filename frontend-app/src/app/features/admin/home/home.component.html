<div class="dash-wrapper">
  <div class="dash-header">
    <div>
      <h2 class="dash-title">Tổng quan</h2>
      <p class="dash-subtitle">Thống kê nhanh hệ thống (admin).</p>
    </div>

    <div class="dash-actions">
      <!-- Bạn có thể thêm nút refresh sau -->
      <!-- <button class="btn-primary" type="button" (click)="reload()">↻ Tải lại</button> -->
    </div>
  </div>

  <div class="dash-grid" *ngIf="!isLoading; else loadingTpl">
    <app-admin-stat-card
      title="Sản phẩm"
      icon="📦"
      [value]="formatNumber(summary.productsCount)"
      subtitle="Tổng số sản phẩm"
      trend="neutral"
    />

    <app-admin-stat-card
      title="Danh mục"
      icon="🗂️"
      [value]="formatNumber(summary.categoriesCount)"
      subtitle="Tổng số danh mục"
      trend="neutral"
    />

    <app-admin-stat-card
      title="Khách hàng"
      icon="👥"
      [value]="formatNumber(summary.usersCount)"
      subtitle="Tổng người dùng (role USER)"
      trend="up"
      hint="Tăng trưởng phụ thuộc dữ liệu thực tế"
    />

    <app-admin-stat-card
      title="Lượt xem"
      icon="👁️"
      [value]="formatNumber(summary.productsCount)"
      subtitle="Tổng view sản phẩm"
      trend="up"
    />

    <app-admin-stat-card
      title="Truy cập"
      icon="🌐"
      [value]="formatNumber(summary.totalClickToWebsite)"
      subtitle="Tổng lượt truy cập website"
      trend="up"
    />
  </div>

  <ng-template #loadingTpl>
    <div class="dash-loading">
      <div class="spinner"></div>
      <p>Đang tải thống kê...</p>
    </div>
  </ng-template>

  <!-- chỗ trống để sau này bạn thêm chart -->
  <div class="dash-panel">
    <h3 class="panel-title">Biểu đồ</h3>
    <p class="panel-subtitle">Bạn có thể thêm chart (7/30 ngày) sau.</p>
    <div class="panel-placeholder">Chart placeholder</div>
  </div>
</div>
