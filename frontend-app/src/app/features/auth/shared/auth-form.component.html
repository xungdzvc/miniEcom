<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h2>{{ title }}</h2>
      <p class="subtitle">Welcome to our platform</p>
    </div>

    <form (ngSubmit)="submitForm()">
      <div class="form-group">
        <label>Username</label>
        <input
          type="text"
          placeholder="Enter your username"
          [(ngModel)]="form.username"
          name="username"
          class="form-control"
          required
        />
      </div>

      @if (mode === 'register') {
        <div class="form-group slide-in">
          <label>Email Address</label>
          <input
            type="email"
            placeholder="name@example.com"
            [(ngModel)]="form.email"
            name="email"
            class="form-control"
            required
          />
        </div>
      }

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          placeholder="••••••••"
          [(ngModel)]="form.password"
          name="password"
          class="form-control"
          required
        />
      </div>

      @if (mode === 'register') {
        <div class="form-group slide-in">
          <label>Confirm Password</label>
          <input
            type="password"
            placeholder="••••••••"
            [(ngModel)]="form.retype_password"
            name="retype_password"
            class="form-control"
            required
          />
        </div>
      }

      @if (errorMessage) {
        <div class="error-banner">{{ errorMessage }}</div>
      }

      <button type="submit" class="btn-submit">
        {{ buttonText }}
      </button>

      <!-- Divider -->
      <div class="auth-divider">
        <span>Hoặc</span>
      </div>

      <!-- Google Login -->
      <div class="google-login-wrapper">
        <div #googleBtn></div>
      </div>

      <!-- Extra actions -->
      <ng-content></ng-content>


      <!-- Extra actions: forgot password + switch login/register -->
      @if (mode === 'login' && showLoginExtras) {
        <div class="aux-row">
          <a class="link" [routerLink]="forgotPasswordPath">Quên mật khẩu?</a>
          <a class="btn-secondary" [routerLink]="registerPath">Đăng ký</a>
        </div>
      }

      @if (mode === 'register') {
        <div class="aux-row center">
          <span class="muted">Đã có tài khoản?</span>
          <a class="link" [routerLink]="loginPath">Đăng nhập</a>
        </div>
      }
    </form>
  </div>
</div>
