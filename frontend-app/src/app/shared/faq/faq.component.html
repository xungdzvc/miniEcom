<section class="faq">
  <div class="container faq-wrapper">
    
    <div class="faq-intro">
      <span class="badge">FAQ</span>
      <h2 class="display-title">Câu hỏi <br> <span>thường gặp</span></h2>
      <p class="muted">Giải đáp mọi thắc mắc trước khi bạn đưa ra quyết định.</p>
      <a href="#" class="btn-link">Liên hệ hỗ trợ →</a>
    </div>

    <div class="faq-list">
      <div class="faq-item" 
           *ngFor="let f of faqs; let i = index" 
           [class.active]="f.open"
           (click)="toggle(f)">
        
        <div class="faq-header">
          <div class="header-left">
            <span class="faq-number">{{ i + 1 | number:'2.0-0' }}</span>
            <h4>{{ f.question }}</h4>
          </div>
          <div class="icon-box">
            <i class="chevron-icon"></i> </div>
        </div>

        <div class="faq-body">
          <p>{{ f.answer }}</p>
        </div>

      </div>
    </div>

  </div>
</section>
